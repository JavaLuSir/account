<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭账本</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 350px; border-radius: 16px; }
    </style>
</head>
<body>
    <div class="card login-card p-4">
        <h4 class="text-center mb-4">家庭账本</h4>
        <form onsubmit="return doLogin(event)">
            <div class="mb-3">
                <input type="text" class="form-control" id="username" placeholder="用户名" value="admin" required>
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" id="password" placeholder="密码" value="123456" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">登录</button>
        </form>
    </div>
    <div id="mainContent" style="display:none;">
        <h1>登录成功！</h1>
        <button onclick="logout()">退出</button>
    </div>
    <script>
        function doLogin(e) {
            e.preventDefault();
            var u = document.getElementById('username').value;
            var p = document.getElementById('password').value;
            if(u && p) {
                localStorage.setItem('token', 'ok');
                document.querySelector('body').innerHTML = '<h1>登录成功！</h1>';
            }
        }
    </script>
</body>
</html>
